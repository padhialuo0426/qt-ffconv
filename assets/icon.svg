<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- FFmpeg 绿（偏森林绿） -->
    <linearGradient id="ff" gradientUnits="userSpaceOnUse" x1="96" y1="196" x2="415" y2="196">
      <stop offset="0" stop-color="#3f7d1f"/>
      <stop offset="1" stop-color="#5aa02a"/>
    </linearGradient>
    <!-- Qt 品牌绿 #41CD52 -->
    <linearGradient id="qt" gradientUnits="userSpaceOnUse" x1="97" y1="316" x2="416" y2="316">
      <stop offset="0" stop-color="#2fa542"/>
      <stop offset="1" stop-color="#41cd52"/>
    </linearGradient>
    <!-- 深色板岩底板 -->
    <linearGradient id="bg" gradientUnits="userSpaceOnUse" x1="0" y1="24" x2="0" y2="488">
      <stop offset="0" stop-color="#333a44"/>
      <stop offset="1" stop-color="#20242b"/>
    </linearGradient>
  </defs>

  <!-- 圆角方形底板 -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg)"/>

  <!-- 上：向左箭头，FFmpeg 绿 -->
  <line x1="184" y1="196" x2="392" y2="196"
        fill="none" stroke="url(#ff)" stroke-width="46"
        stroke-linecap="round"/>
  <path d="M 96 196 L 200 138 L 200 254 Z" fill="url(#ff)"/>

  <!-- 下：向右箭头，Qt 绿 -->
  <line x1="120" y1="316" x2="328" y2="316"
        fill="none" stroke="url(#qt)" stroke-width="46"
        stroke-linecap="round"/>
  <path d="M 416 316 L 312 258 L 312 374 Z" fill="url(#qt)"/>
</svg>
